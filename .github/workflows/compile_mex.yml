name: Compile CAT mex-files

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compile_mex:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # On Linux, the OS version should be as old as possible for mex compatibility.
          - os: ubuntu-22.04
            os_name: Linux
            mex_ext: mexa64
            matlab_release: R2020a
            matlab_legacy: true
          # On Mac and Windows, only the Matlab version matters for mex compatibility, so the OS can be the latest.
          - os: macos-15-intel
            os_name: macOS_Intel
            mex_ext: mexmaci64
            matlab_release: R2020a
            matlab_legacy: true
          - os: macos-latest
            os_name: macOS_Apple_Silicon
            mex_ext: mexmaca64
            matlab_release: R2023b
            matlab_legacy: false
          - os: windows-latest
            os_name: Windows
            mex_ext: mexw64
            matlab_release: R2022a
            matlab_legacy: true

    steps:
      - name: Set up MATLAB (legacy)
        if: ${{ matrix.matlab_legacy }}
        uses: matlab-actions/setup-matlab@v1
        with:
          release: ${{ matrix.matlab_release }}
      - name: Set up MATLAB
        if: ${{ !matrix.matlab_legacy }}
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ matrix.matlab_release }}

      - name: Checkout SPM
        uses: actions/checkout@v4
        with:
          repository: spm/spm
          path: spm

      - name: Checkout CAT into SPM toolbox
        # Checks out directly into spm/toolbox/CAT — no rsync or cp needed,
        # works on all platforms including Windows.
        uses: actions/checkout@v4
        with:
          path: spm/toolbox/CAT

      - name: Delete old MEX files on Ubuntu and Mac
        if: matrix.os != 'windows-latest'
        run: find spm/toolbox/CAT -type f -name "*.mex*" -delete

      - name: Delete old MEX files on Windows
        if: matrix.os == 'windows-latest'
        run: Get-ChildItem -Path .\ -Recurse -Include *.mex* | Remove-Item -Force
        #run: Get-ChildItem -Path spm\toolbox\CAT -Recurse -Include *.mex* | Remove-Item -Force
  
      - name: Install rsync on Windows
        if: runner.os == 'Windows'
        run: choco install -y rsync
        shell: bash

      - name: Install CAT in SPM toolbox
        shell: bash
        run: |
          mkdir -p spm/toolbox/CAT
          rsync -a --exclude='.git' \
            --exclude='spm/toolbox/CAT/' \
            --exclude='batches/' \
            --exclude='catQC/' \
            --exclude='check_pipeline/' \
            --exclude='development/' \
            --exclude='html/' \
            --exclude='internal/' \
            --exclude='mexmaca/' \
            --exclude='mexmaci/' \
            --exclude='spm/' \
            --exclude='Makefile' \
            ./ spm/toolbox/CAT/

      - name: Compile CAT mex-files
        uses: matlab-actions/run-command@v2
        with:
          command: |
            ws = getenv('GITHUB_WORKSPACE');
            addpath(fullfile(ws, 'spm'));
            cd(fullfile(ws, 'spm', 'toolbox', 'CAT'))
            compile(1,0)

      - name: Install zip on Windows
        if: runner.os == 'Windows'
        run: choco install zip -y
        shell: bash

      - name: Zip mex-files
        run: |
          cd spm/toolbox/
          zip -r ../../cat_${{ github.ref_name }}_${{ matrix.mex_ext }}.zip . -i CAT/*.${{ matrix.mex_ext }}

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: cat_${{ github.ref_name }}_${{ matrix.mex_ext }}
          path: cat_*.zip
