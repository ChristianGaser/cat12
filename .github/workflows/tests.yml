name: CAT tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    runs-on: ubuntu-22.04
    steps:
      # OS version kept as old as possible for mex compatibility (see compile_mex.yml)
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v1
        with:
          release: R2020a

      - name: Checkout SPM
        uses: actions/checkout@v4
        with:
          repository: spm/spm
          path: spm

      - name: Checkout CAT into SPM toolbox
        uses: actions/checkout@v4
        with:
          path: spm/toolbox/CAT

      - name: Delete old MEX files
        run: find spm/toolbox/CAT -type f -name "*.mex*" -delete

      - name: Compile mex-files and run tests
        uses: matlab-actions/run-command@v1
        with:
          command: |
            ws = getenv('GITHUB_WORKSPACE');
            addpath(fullfile(ws, 'spm'));
            cd(fullfile(ws, 'spm', 'toolbox', 'CAT'))
            compile(1, 0, 2);                          % build mex-files for this runner
            ok1 = compile(0, 1, 2);                    % test compiled c-functions
            [ok2, ~] = cat_tst_unittests(2);           % parsing / option / config unit tests
            if ~(ok1 && ok2), error('CAT:tests', 'CAT12 tests failed.'); end
            disp('All CAT12 tests passed.')
